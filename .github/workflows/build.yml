name: Build SEN0658 PC tools

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: sen0658-linux-amd64
            runner: ubuntu-24.04
            shell: bash
            exe_name: sen0658_poll
            archive_name: sen0658-linux-amd64.tar.gz
          - artifact_name: sen0658-linux-arm64
            runner: ubuntu-24.04-arm
            shell: bash
            exe_name: sen0658_poll
            archive_name: sen0658-linux-arm64.tar.gz
          - artifact_name: sen0658-windows-amd64
            runner: windows-latest
            shell: pwsh
            exe_name: sen0658_poll.exe
            archive_name: sen0658-windows-amd64.zip

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSEN0658_BUILD_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage Linux artifact
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.artifact_name }}/bin
          cp build/${{ matrix.exe_name }} dist/${{ matrix.artifact_name }}/bin/
          cp README.md dist/${{ matrix.artifact_name }}/
          tar -czf dist/${{ matrix.archive_name }} -C dist ${{ matrix.artifact_name }}

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact_name }}/bin | Out-Null
          Copy-Item build/Release/${{ matrix.exe_name }} dist/${{ matrix.artifact_name }}/bin/
          Copy-Item README.md dist/${{ matrix.artifact_name }}/
          Compress-Archive -Path dist/${{ matrix.artifact_name }} -DestinationPath dist/${{ matrix.archive_name }} -Force

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error
